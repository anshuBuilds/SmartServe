spring:
  application:
    name: smartserve

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartserve}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    expiration-ms: 86400000
  bootstrap:
    admin:
      username: ${SMARTSERVE_ADMIN_USERNAME:admin}
      password: ${SMARTSERVE_ADMIN_PASSWORD:admin12345}
      full-name: ${SMARTSERVE_ADMIN_FULL_NAME:System Admin}